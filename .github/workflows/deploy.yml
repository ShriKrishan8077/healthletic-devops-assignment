name: Healthletic CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: shrikrishansharma/healthletic-api
  IMAGE_TAG: v1.0.${{ github.run_number }}

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG .

      - name: Scan Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: table

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Image
        run: |
          docker push $IMAGE_NAME:$IMAGE_TAG

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            export KUBECONFIG=$HOME/.kube/config

            cd ~/healthletic-devops-assignment

            git pull origin main

            helm upgrade --install healthletic ./helm/flask-api \
              --namespace healthletic \
              --create-namespace \
              --set image.repository=${{ env.IMAGE_NAME }} \
              --set image.tag=${{ env.IMAGE_TAG }} \
              --wait

            kubectl rollout status deployment/healthletic -n healthletic

            kubectl port-forward svc/healthletic 5000:5000 -n healthletic >/dev/null 2>&1 &
            sleep 5

            HEALTH=$(curl -s http://localhost:5000/health | grep healthy)
            DB=$(curl -s http://localhost:5000/db-health | grep connected)

            if [ -n "$HEALTH" ] && [ -n "$DB" ]; then
              echo "Smoke Test Passed"
              kill $PF_PID
            else
              echo "Smoke Test Failed. Rolling back..."
              kill $PF_PID
              helm rollback healthletic -n healthletic
              exit 1
            fi

            echo "Deployment Successful"